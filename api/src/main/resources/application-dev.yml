server:
  port: 8082

spring:
  datasource:
    url: jdbc:h2:mem:admin;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

user-service:
  base-url: ${USER_SERVICE_BASE_URL:http://localhost:8082}

security:
  jwt:
    enabled: true
    issuer: ${AUTH_JWT_ISSUER:auth-service}
    secret: ${AUTH_JWT_SECRET:abcdefghijklmnopqrstuvwxyz12345678901234567890}
    audience: ${AUTH_JWT_AUDIENCE:user-service}
    internal-scope: ${AUTH_INTERNAL_SCOPE:internal}
