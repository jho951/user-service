server:
  port: 8082

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/user_service?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME:user_service}
    password: ${SPRING_DATASOURCE_PASSWORD:user_service}

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        show_sql: false
        type:
          preferred_uuid_jdbc_type: CHAR

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  metrics:
    tags:
      service: ${spring.application.name:user-service}
      env: ${SPRING_PROFILES_ACTIVE:local}

logging:
  level:
    com.api.config.logging.com.userservice.app.config.logging.RequestAccessLogFilter: INFO
    org.hibernate.SQL: ${LOGGING_LEVEL_ORG_HIBERNATE_SQL:WARN}
    org.hibernate.orm.jdbc.bind: ${LOGGING_LEVEL_ORG_HIBERNATE_BIND:WARN}

platform:
  governance:
    audit:
      environment: ${PLATFORM_GOVERNANCE_AUDIT_ENVIRONMENT:prod}
    engine:
      strict: true
    violation:
      handler-failure-fatal: true
  security:
    ip-guard:
      enabled: true
    rate-limit:
      enabled: true
