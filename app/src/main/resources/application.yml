spring:
  application:
    name: user-service
  profiles:
    default: dev
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT_MS:1000ms}

features:
  public-user-api:
    enabled: true
  internal-user-api:
    enabled: true

platform:
  governance:
    enabled: ${PLATFORM_GOVERNANCE_ENABLED:true}
    audit:
      enabled: ${PLATFORM_GOVERNANCE_AUDIT_ENABLED:true}
      service-name: ${PLATFORM_GOVERNANCE_AUDIT_SERVICE_NAME:${spring.application.name:user-service}}
      environment: ${PLATFORM_GOVERNANCE_AUDIT_ENVIRONMENT:${spring.profiles.active:local}}
      failure-policy: ${PLATFORM_GOVERNANCE_AUDIT_FAILURE_POLICY:FAIL_CLOSED}
      identity:
        enabled: ${PLATFORM_GOVERNANCE_AUDIT_IDENTITY_ENABLED:true}
        validation-enabled: ${PLATFORM_GOVERNANCE_AUDIT_IDENTITY_VALIDATION_ENABLED:true}
        fail-on-validation-error: ${PLATFORM_GOVERNANCE_AUDIT_IDENTITY_FAIL_ON_VALIDATION_ERROR:true}
    engine:
      strict: ${PLATFORM_GOVERNANCE_ENGINE_STRICT:false}
    violation:
      action: ${PLATFORM_GOVERNANCE_VIOLATION_ACTION:DENY}
      handler-failure-fatal: ${PLATFORM_GOVERNANCE_VIOLATION_HANDLER_FAILURE_FATAL:false}
    operational:
      fail-fast-enabled: ${PLATFORM_GOVERNANCE_OPERATIONAL_FAIL_FAST_ENABLED:true}
      production-profiles: ${PLATFORM_GOVERNANCE_OPERATIONAL_PRODUCTION_PROFILES:prod}
      allow-non-strict-engine-in-production: ${PLATFORM_GOVERNANCE_OPERATIONAL_ALLOW_NON_STRICT_ENGINE_IN_PRODUCTION:false}
      require-policy-config-in-enforcing-mode: ${PLATFORM_GOVERNANCE_OPERATIONAL_REQUIRE_POLICY_CONFIG_IN_ENFORCING_MODE:false}
      require-fatal-handler-failures-in-production: ${PLATFORM_GOVERNANCE_OPERATIONAL_REQUIRE_FATAL_HANDLER_FAILURES_IN_PRODUCTION:true}
  security:
    enabled: ${PLATFORM_SECURITY_ENABLED:true}
    service-role-preset: ${PLATFORM_SECURITY_SERVICE_ROLE_PRESET:API_SERVER}
    boundary:
      public-paths:
        - /actuator/**
        - /v3/api-docs/**
        - /swagger-ui/**
        - /swagger-ui.html
        - /favicon.ico
        - /error
        - /users/signup
      protected-paths:
        - /users/**
      admin-paths: []
      internal-paths:
        - /internal/**
    auth:
      enabled: ${PLATFORM_SECURITY_AUTH_ENABLED:true}
      internal-token-enabled: ${PLATFORM_SECURITY_INTERNAL_TOKEN_ENABLED:true}
      jwt-secret: ${USER_SERVICE_INTERNAL_JWT_SECRET:${AUTH_JWT_SECRET:platform-security-dev-secret-platform-security-dev-secret}}
      jwt-issuer: ${USER_SERVICE_INTERNAL_JWT_ISSUER:${AUTH_JWT_ISSUER:}}
      jwt-audience: ${USER_SERVICE_INTERNAL_JWT_AUDIENCE:${AUTH_JWT_AUDIENCE:}}
      internal-required-authorities:
        - SCOPE_${USER_SERVICE_INTERNAL_JWT_SCOPE:${AUTH_INTERNAL_SCOPE:internal}}
      gateway-header:
        enabled: ${PLATFORM_SECURITY_GATEWAY_HEADER_ENABLED:true}
    ip-guard:
      enabled: ${PLATFORM_SECURITY_IP_GUARD_ENABLED:false}
      trust-proxy: ${PLATFORM_SECURITY_IP_GUARD_TRUST_PROXY:false}
      admin:
        rules: ${PLATFORM_SECURITY_ADMIN_ALLOW_CIDRS:${PLATFORM_SECURITY_ADMIN_ALLOW_CIDR:10.0.0.0/8}}
      internal:
        rules: ${PLATFORM_SECURITY_INTERNAL_ALLOW_CIDRS:${PLATFORM_SECURITY_INTERNAL_ALLOW_CIDR:172.16.0.0/12}}
    rate-limit:
      enabled: ${PLATFORM_SECURITY_RATE_LIMIT_ENABLED:false}
