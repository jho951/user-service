rootProject.name = 'admin'
include 'core', 'api'

dependencyResolutionManagement {
    repositories {
        mavenCentral()

        maven {
            url = uri("https://maven.pkg.github.com/jho951/auth")
            credentials {
                username = System.getenv("GITHUB_ACTOR")
                        ?: providers.gradleProperty("gprUser").orNull

                password = System.getenv("GITHUB_TOKEN")
                        ?: providers.gradleProperty("gprKey").orNull
            }
        }
    }
}
