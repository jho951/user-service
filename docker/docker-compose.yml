services:
  user-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: user-server:local
    container_name: user-server
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      USER_SERVICE_BASE_URL: ${USER_SERVICE_BASE_URL:?USER_SERVICE_BASE_URL is required}
      USER_SERVICE_INTERNAL_JWT_ISSUER: ${USER_SERVICE_INTERNAL_JWT_ISSUER:?USER_SERVICE_INTERNAL_JWT_ISSUER is required}
      USER_SERVICE_INTERNAL_JWT_AUDIENCE: ${USER_SERVICE_INTERNAL_JWT_AUDIENCE:?USER_SERVICE_INTERNAL_JWT_AUDIENCE is required}
      USER_SERVICE_INTERNAL_JWT_SECRET: ${USER_SERVICE_INTERNAL_JWT_SECRET:?USER_SERVICE_INTERNAL_JWT_SECRET is required}
      USER_SERVICE_INTERNAL_JWT_SCOPE: ${USER_SERVICE_INTERNAL_JWT_SCOPE:-internal}
      FEATURES_PUBLIC_USER_API_ENABLED: ${FEATURES_PUBLIC_USER_API_ENABLED:-false}
      FEATURES_INTERNAL_USER_API_ENABLED: ${FEATURES_INTERNAL_USER_API_ENABLED:-true}
      FEATURES_ADMIN_API_ENABLED: ${FEATURES_ADMIN_API_ENABLED:-false}
      FEATURES_ADMIN_AUTH_ENABLED: ${FEATURES_ADMIN_AUTH_ENABLED:-false}
      TZ: ${TZ:-Asia/Seoul}
    restart: unless-stopped
