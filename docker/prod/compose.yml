name: user-service-prod

services:
  mysql:
    environment:
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    volumes:
      - user_service_mysql_data_prod:/var/lib/mysql
      - ./prod/services/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]

  user-service:
    image: user-service:prod
    expose:
      - "8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?SPRING_DATASOURCE_PASSWORD is required}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?AUTH_JWT_SECRET is required}
      USER_SERVICE_INTERNAL_JWT_SECRET: ${USER_SERVICE_INTERNAL_JWT_SECRET:?USER_SERVICE_INTERNAL_JWT_SECRET is required}

volumes:
  user_service_mysql_data_prod:
