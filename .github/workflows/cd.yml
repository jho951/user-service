name: CD

on:
  push:
    branches:
      - main
      - master
      - dev
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: Deployment environment.
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

permissions:
  contents: read
  packages: read
  id-token: write

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CONTRACT_REPO: https://github.com/jho951/service-contract
  SERVICE_NAME: user-service
  CD_PROFILE: ec2-compose
  COMPOSE_VALIDATE_SCRIPT: ./scripts/validate-compose.sh
  DEPLOY_WRAPPER_SCRIPT: ./scripts/deploy-stack-service.sh
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  HEALTH_URL: ${{ vars.HEALTH_URL || '' }}
  READY_URL: ${{ vars.READY_URL || '' }}
  HAS_EC2_DEPLOY_TARGET: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_SSH_KEY != '' }}
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || '' }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'ec2-user' }}
  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
  DEPLOY_BUNDLE_DIR: ${{ vars.DEPLOY_BUNDLE_DIR || '/opt/deploy' }}
  IMAGE_BUILD_COMMAND: |
    DOCKER_BUILDKIT=1 docker build \
      --secret id=gh_token,env=GH_TOKEN \
      --secret id=github_actor,env=GITHUB_ACTOR \
      -f docker/Dockerfile \
      -t "${IMAGE_URI}" \
      .
    docker push "${IMAGE_URI}"
    if [ "${PUBLISH_LATEST}" = "true" ]; then
      docker tag "${IMAGE_URI}" "${LATEST_IMAGE_URI}"
      docker push "${LATEST_IMAGE_URI}"
    fi
  GITHUB_ACTOR: ${{ github.actor }}
  GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GH_TOKEN || secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN || github.token }}

jobs:
  deploy-gate:
    name: Deploy Gate
    runs-on: ubuntu-latest
    outputs:
      deploy_environment: ${{ steps.target.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate contract lock
        shell: bash
        run: |
          set -euo pipefail
          test -f contract.lock.yml
          grep -q "repo: ${CONTRACT_REPO}" contract.lock.yml
          grep -q "name: ${SERVICE_NAME}" contract.lock.yml
          grep -q "cd:" contract.lock.yml
          grep -q "profile: ${CD_PROFILE}" contract.lock.yml

      - name: Resolve target environment
        id: target
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ inputs.deploy_environment }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            target="prod"
          elif [ "${{ github.ref_name }}" = "main" ] || [ "${{ github.ref_name }}" = "master" ]; then
            target="prod"
          else
            target="dev"
          fi
          if [ "$target" = "prod" ] && [ "${{ github.ref_name }}" != "main" ] && [ "${{ github.ref_name }}" != "master" ] && [ "${{ github.ref_type }}" != "tag" ]; then
            echo "Production deploy requires main/master branch or a tag."
            exit 1
          fi
          echo "environment=$target" >> "$GITHUB_OUTPUT"

  image:
    name: Image
    runs-on: ubuntu-latest
    needs: deploy-gate
    environment: ${{ needs.deploy-gate.outputs.deploy_environment }}
    outputs:
      image_uri: ${{ steps.resolve.outputs.image_uri }}
      latest_image_uri: ${{ steps.resolve.outputs.latest_image_uri }}
      repository: ${{ steps.resolve.outputs.repository }}
      registry: ${{ steps.resolve.outputs.registry }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image target
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          repo="${ECR_REPOSITORY_NAME:-${{ needs.deploy-gate.outputs.deploy_environment }}-${SERVICE_NAME}}"
          registry="${{ steps.login-ecr.outputs.registry }}"
          image_uri="${registry}/${repo}:${GITHUB_SHA}"
          latest_image_uri="${registry}/${repo}:latest"
          echo "repository=$repo" >> "$GITHUB_OUTPUT"
          echo "registry=$registry" >> "$GITHUB_OUTPUT"
          echo "image_uri=$image_uri" >> "$GITHUB_OUTPUT"
          echo "latest_image_uri=$latest_image_uri" >> "$GITHUB_OUTPUT"

      - name: Ensure ECR repository
        shell: bash
        env:
          REPOSITORY_NAME: ${{ steps.resolve.outputs.repository }}
        run: |
          set -euo pipefail
          aws ecr describe-repositories --region "${AWS_REGION}" --repository-names "${REPOSITORY_NAME}" >/dev/null 2>&1 || \
            aws ecr create-repository --region "${AWS_REGION}" --repository-name "${REPOSITORY_NAME}" >/dev/null

      - name: Build and push image
        shell: bash
        env:
          IMAGE_URI: ${{ steps.resolve.outputs.image_uri }}
          LATEST_IMAGE_URI: ${{ steps.resolve.outputs.latest_image_uri }}
          PUBLISH_LATEST: ${{ github.ref_name == 'main' || github.ref_name == 'master' }}
        run: |
          set -euo pipefail
          ${{ env.IMAGE_BUILD_COMMAND }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - deploy-gate
      - image
    environment: ${{ needs.deploy-gate.outputs.deploy_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch contract source
        shell: bash
        run: |
          bash ./scripts/fetch-contract.sh

      - name: Ensure wrappers are executable
        run: chmod +x "${COMPOSE_VALIDATE_SCRIPT}" "${DEPLOY_WRAPPER_SCRIPT}"

      - name: Validate dev compose
        run: ${{ env.COMPOSE_VALIDATE_SCRIPT }} dev

      - name: Validate prod compose
        run: ${{ env.COMPOSE_VALIDATE_SCRIPT }} prod

      - name: Setup SSH agent
        if: ${{ env.HAS_EC2_DEPLOY_TARGET == 'true' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add deploy host to known_hosts
        if: ${{ env.HAS_EC2_DEPLOY_TARGET == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          DEPLOY_HOST_CLEAN="$(printf '%s' "${DEPLOY_HOST}" | tr -d '[:space:]')"
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST_CLEAN}" >> ~/.ssh/known_hosts

      - name: Deploy via /opt/deploy wrapper
        if: ${{ env.HAS_EC2_DEPLOY_TARGET == 'true' }}
        env:
          USER_SERVICE_IMAGE: ${{ needs.image.outputs.image_uri }}
        run: ${{ env.DEPLOY_WRAPPER_SCRIPT }} "${{ needs.deploy-gate.outputs.deploy_environment }}"

      - name: Skip deploy
        if: ${{ env.HAS_EC2_DEPLOY_TARGET != 'true' }}
        shell: bash
        run: echo "No EC2 deploy target configured; image publish and compose validation completed."

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          if [ "${HAS_EC2_DEPLOY_TARGET}" != "true" ]; then
            echo "Skipping remote health check."
            exit 0
          fi
          if [ -z "${HEALTH_URL}" ]; then
            echo "Skipping remote health check."
            exit 0
          fi
          curl --fail --retry 12 --retry-delay 5 "${HEALTH_URL}"

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: health-check
    steps:
      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail
          if [ "${HAS_EC2_DEPLOY_TARGET}" != "true" ]; then
            echo "Skipping remote smoke test."
            exit 0
          fi
          if [ -z "${READY_URL}" ]; then
            echo "Skipping remote smoke test."
            exit 0
          fi
          curl --fail --retry 12 --retry-delay 5 "${READY_URL}"
