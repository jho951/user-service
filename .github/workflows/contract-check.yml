name: contract-check

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - dev
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: contract-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CONTRACT_REPO: https://github.com/jho951/service-contract
  SERVICE_NAME: user-service
  CONTRACT_IMPACT_REGEX: '(^app/src/main/java/.*(Controller|User|Profile|Visibility|Privacy|Social|Audit|Security|Error|Response|Dto|Config).*\.java$)|(^app/src/main/resources/.*\.(yml|yaml|properties)$)|(^docs/openapi/)|(^README\.md$)|(^contract\.lock\.yml$)'

jobs:
  contract-lock:
    name: Contract Lock
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate contract lock
        shell: bash
        run: |
          set -euo pipefail
          test -f contract.lock.yml
          grep -q "repo: ${CONTRACT_REPO}" contract.lock.yml
          grep -q "name: ${SERVICE_NAME}" contract.lock.yml
          grep -q "ref:" contract.lock.yml
          grep -q "commit:" contract.lock.yml
          grep -q "consumes:" contract.lock.yml
          grep -q "contract_lock: true" contract.lock.yml
          grep -q "ci:" contract.lock.yml
          grep -q "cd:" contract.lock.yml

      - name: Fetch contract source
        shell: bash
        run: |
          bash ./scripts/fetch-contract.sh

      - name: Verify consumed contract paths
        shell: bash
        run: |
          set -euo pipefail
          awk '
            /^[^[:space:]]/ { in_consumes = 0 }
            /^[[:space:]]+consumes:/ { in_consumes = 1; next }
            in_consumes && /^[[:space:]]+-[[:space:]]+/ {
              sub(/^[[:space:]]+-[[:space:]]+/, "")
              print
            }
          ' contract.lock.yml | while read -r path; do
            case "$path" in
              *"*"*) compgen -G ".contract/$path" > /dev/null ;;
              *) test -e ".contract/$path" ;;
            esac
          done

      - name: Detect contract impact
        if: ${{ github.event_name == 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" > changed-files.txt
          if grep -Eq "${CONTRACT_IMPACT_REGEX}" changed-files.txt; then
            if ! grep -qx "contract.lock.yml" changed-files.txt; then
              echo "Contract-impacting files changed. Update contract.lock.yml or split contract changes first."
              cat changed-files.txt
              exit 1
            fi
          fi
