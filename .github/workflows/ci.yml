name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
      - "fix/**"
      - "refactor/**"
      - "chore/**"
  pull_request:

permissions:
  contents: read
  packages: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GH_TOKEN || secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GH_TOKEN || secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for Gradle
        run: chmod +x ./gradlew

      - name: Build and test
        run: ./gradlew --no-daemon clean build

      - name: Validate Docker Compose files
        run: |
          docker compose -f docker/dev/compose.yml config >/tmp/user-dev.yml
          MYSQL_PASSWORD=ci MYSQL_ROOT_PASSWORD=ci SPRING_DATASOURCE_PASSWORD=ci AUTH_JWT_SECRET=abcdefghijklmnopqrstuvwxyz12345678901234567890 USER_SERVICE_INTERNAL_JWT_SECRET=abcdefghijklmnopqrstuvwxyz12345678901234567890 docker compose -f docker/prod/compose.yml config >/tmp/user-prod.yml
