name: CI

on:
  push:
    branches:
      - main
      - master
      - dev
      - develop
      - "feature/**"
      - "fix/**"
      - "refactor/**"
      - "chore/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CONTRACT_REPO: https://github.com/jho951/service-contract
  SERVICE_NAME: user-service
  CI_PROFILE: spring-boot
  CI_RUNTIME: java
  JAVA_VERSION: "17"
  COMPOSE_VALIDATE_SCRIPT: ./scripts/validate-compose.sh
  TEST_COMMAND: ./gradlew --no-daemon clean test
  BUILD_COMMAND: ./gradlew --no-daemon :app:bootJar -x test
  IMAGE_URI: ghcr.io/${{ github.repository }}
  CI_IMAGE_BUILD_COMMAND: |
    DOCKER_BUILDKIT=1 docker build \
      --secret id=gh_token,env=GH_TOKEN \
      --build-arg GITHUB_ACTOR="${GITHUB_ACTOR}" \
      -f docker/Dockerfile \
      -t "${IMAGE_URI}:ci-${GITHUB_SHA}" \
      .
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GH_TOKEN || secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN || github.token }}
  GH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GH_TOKEN || secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN || github.token }}

jobs:
  contract-lock:
    name: Contract Lock
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate contract lock
        shell: bash
        run: |
          set -euo pipefail
          test -f contract.lock.yml
          grep -q "repo: ${CONTRACT_REPO}" contract.lock.yml
          grep -q "name: ${SERVICE_NAME}" contract.lock.yml
          grep -q "ref:" contract.lock.yml
          grep -q "commit:" contract.lock.yml
          grep -q "consumes:" contract.lock.yml
          grep -q "contract_lock: true" contract.lock.yml
          grep -q "ci:" contract.lock.yml
          grep -q "cd:" contract.lock.yml

      - name: Fetch contract source
        shell: bash
        run: |
          bash ./scripts/fetch-contract.sh

      - name: Verify consumed contract paths
        shell: bash
        run: |
          set -euo pipefail
          awk '
            /^[^[:space:]]/ { in_consumes = 0 }
            /^[[:space:]]+consumes:/ { in_consumes = 1; next }
            in_consumes && /^[[:space:]]+-[[:space:]]+/ {
              sub(/^[[:space:]]+-[[:space:]]+/, "")
              print
            }
          ' contract.lock.yml | while read -r path; do
            case "$path" in
              *"*"*) compgen -G ".contract/$path" > /dev/null ;;
              *) test -e ".contract/$path" ;;
            esac
          done

  setup-runtime:
    name: Setup Runtime
    runs-on: ubuntu-latest
    needs: contract-lock
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        if: ${{ env.CI_RUNTIME == 'java' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Setup Docker Buildx
        if: ${{ env.CI_IMAGE_BUILD_COMMAND != 'skip' }}
        uses: docker/setup-buildx-action@v3

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: setup-runtime
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch contract source
        shell: bash
        run: |
          bash ./scripts/fetch-contract.sh

      - name: Setup Java
        if: ${{ env.CI_RUNTIME == 'java' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant Gradle permission
        if: ${{ env.CI_RUNTIME == 'java' }}
        run: chmod +x ./gradlew

      - name: Ensure compose validate wrapper is executable
        run: chmod +x "${COMPOSE_VALIDATE_SCRIPT}"

      - name: Run tests
        if: ${{ env.TEST_COMMAND != 'skip' }}
        shell: bash
        run: ${{ env.TEST_COMMAND }}

      - name: Validate dev compose
        run: ${{ env.COMPOSE_VALIDATE_SCRIPT }} dev

      - name: Validate prod compose
        run: ${{ env.COMPOSE_VALIDATE_SCRIPT }} prod

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        if: ${{ env.CI_RUNTIME == 'java' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant Gradle permission
        if: ${{ env.CI_RUNTIME == 'java' }}
        run: chmod +x ./gradlew

      - name: Build artifact
        if: ${{ env.BUILD_COMMAND != 'skip' }}
        shell: bash
        run: ${{ env.BUILD_COMMAND }}

  image:
    name: Image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        if: ${{ env.CI_IMAGE_BUILD_COMMAND != 'skip' }}
        shell: bash
        run: |
          set -euo pipefail
          ${{ env.CI_IMAGE_BUILD_COMMAND }}

      - name: Skip Docker image
        if: ${{ env.CI_IMAGE_BUILD_COMMAND == 'skip' }}
        run: echo "No Docker image is produced for ${{ env.SERVICE_NAME }}."
