name: Backend CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "**"                    # 필요하면 src/**, build.gradle 등으로 좁혀도 됨
      - ".github/workflows/**"

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # ✅ working-directory 제거 (레포 루트에서 실행)
    # defaults:
    #   run:
    #     working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew    # ✅ 루트에 있는 gradlew 기준

      - name: Build & Test
        run: ./gradlew clean build

      - name: Upload test reports (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: build/reports/tests/test   # ✅ backend/ 제거
