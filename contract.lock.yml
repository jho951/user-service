contract:
  repo: https://github.com/jho951/service-contract
  ref: main
  commit: 9fd9a6dd2d6487740fcddd6454407819cd77eca0

service:
  name: user-service
  branch: main
  role: backend-service
  consumes:
    - shared/routing.md
    - shared/headers.md
    - shared/security.md
    - shared/errors.md
    - shared/ci-cd.md
    - repositories/user-service/**
    - artifacts/openapi/user-service.v1.yaml
    - repositories/auth-service/**

validation:
  contract_lock: true
  openapi: true
  schema: true
  routing: true
  headers: true
  errors: true
  security: true

ci:
  profile: spring-boot
  runtime: java
  java_version: "17"
  setup: gradle
  test_command: ./gradlew --no-daemon clean test
  build_command: ./gradlew --no-daemon :app:bootJar -x test
  docker: true
  contract_check: true

cd:
  profile: ec2-compose
  target: ec2
  strategy: docker-compose
  environments:
    - dev
    - prod
  image_registry: ecr
  deploy_on: protected_branch
  health_check: true
  smoke_test: true

notes:
  owner: user-service
  automation_level: guardrail
  legacy_sync_doc: false
